# قسم الشهادات
testimonials:
    title: "قصص من عائلاتنا"
    subtitle: "تجارب حقيقية من مقدمي الرعاية الذين وجدوا راحة البال"
    quote1: "أخيراً، أستطيع النوم بسلام وأنا أعلم أن أمي في أمان. ونّسني غيّر حياة عائلتنا."
    author1: "مريم، ابنة فاطمة (78 سنة)"
    quote2: "الرعاية التي يتلقاها والدي استثنائية. الفريق يفهم حقاً ما يحتاجه كبار السن."
    author2: "أحمد، ابن حسن (82 سنة)"
    quote3: "ما أحبه أكثر هو الدفء والاحترام الذي يظهرونه لجدتي. يشعرون وكأنهم عائلة."
    author3: "ليلى، حفيدة خيرة (85 سنة)"

