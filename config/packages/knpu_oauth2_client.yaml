knpu_oauth2_client:
    clients:
        google:
            type: google
            client_id: '%env(GOOGLE_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
            redirect_route: connect_google_check
            redirect_params:
                _locale: '%kernel.default_locale%'

        github:
            type: github
            client_id: '%env(GITHUB_CLIENT_ID)%'
            client_secret: '%env(GITHUB_CLIENT_SECRET)%'
            redirect_route: connect_github_check
            redirect_params:
                _locale: '%kernel.default_locale%'

        x_twitter:
            type: generic
            provider_class: League\OAuth2\Client\Provider\GenericProvider
            client_id: '%env(X_CLIENT_ID)%'
            client_secret: '%env(X_CLIENT_SECRET)%'
            redirect_route: connect_x_check
            redirect_params:
                _locale: '%kernel.default_locale%'
            provider_options:
                urlAuthorize: 'https://twitter.com/i/oauth2/authorize'
                urlAccessToken: 'https://api.twitter.com/2/oauth2/token'
                urlResourceOwnerDetails: 'https://api.twitter.com/2/users/me?user.fields=id,name,username,profile_image_url'
