<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI — Microphone Setup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .setup-card {
            background: rgba(30, 30, 40, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .mic-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: pulse 2s infinite;
        }

        .mic-icon.granted {
            background: linear-gradient(135deg, #10b981, #34d399);
            animation: none;
        }

        .mic-icon.denied {
            background: linear-gradient(135deg, #ef4444, #f87171);
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 15px rgba(99, 102, 241, 0);
            }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .status {
            font-size: 1rem;
            margin-bottom: 1.5rem;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 500;
        }

        .status.waiting {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
        }

        .status.granted {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
        }

        .status.denied {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.4;
            border-radius: 50%;
        }

        .blob-1 {
            background: #6366f1;
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            background: #8b5cf6;
            width: 300px;
            height: 300px;
            bottom: -50px;
            right: -50px;
        }
    </style>
</head>

<body>
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="setup-card">
        <div class="mic-icon" id="mic-icon">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
        </div>

        <h1>Microphone Setup</h1>
        <p class="subtitle">Allow microphone access so Nexus AI voice chat works smoothly without asking again.</p>

        <div class="status waiting" id="status">Click the button below to allow microphone</div>

        <div id="action">
            <button class="btn btn-primary" id="allow-btn" onclick="requestMic()">
                🎙️ Allow Microphone
            </button>
        </div>
    </div>

    <script>
        async function requestMic() {
            const icon = document.getElementById('mic-icon');
            const status = document.getElementById('status');
            const action = document.getElementById('action');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Permission granted — stop the stream (we just needed permission)
                stream.getTracks().forEach(t => t.stop());

                icon.classList.add('granted');
                status.className = 'status granted';
                status.textContent = '✅ Microphone access granted! You\'re all set.';
                action.innerHTML = '<a href="index.html" class="btn btn-success">🚀 Go to Nexus AI Chat</a>';

            } catch (err) {
                icon.classList.add('denied');
                status.className = 'status denied';

                if (err.name === 'NotAllowedError') {
                    status.textContent = '❌ Microphone was blocked. Please allow it in your browser settings.';
                } else {
                    status.textContent = '❌ No microphone found. Check your device.';
                }
                action.innerHTML = '<button class="btn btn-primary" onclick="requestMic()">🔄 Try Again</button>';
            }
        }

        // Check if already granted
        if (navigator.permissions) {
            navigator.permissions.query({ name: 'microphone' }).then(result => {
                if (result.state === 'granted') {
                    const icon = document.getElementById('mic-icon');
                    const status = document.getElementById('status');
                    const action = document.getElementById('action');
                    icon.classList.add('granted');
                    status.className = 'status granted';
                    status.textContent = '✅ Microphone already allowed! You\'re good to go.';
                    action.innerHTML = '<a href="index.html" class="btn btn-success">🚀 Go to Nexus AI Chat</a>';
                }
            }).catch(() => { });
        }
    </script>
</body>

</html>
